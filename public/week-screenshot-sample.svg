<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .bg{fill:#f8fafc}
    .col{fill:#ffffff;stroke:#e2e8f0}
    .header{font:700 18px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a}
    .day{font:600 13px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a}
    .event{font:500 11px/1.1 'Segoe UI', Roboto, Arial; fill:#0b1220}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="800" rx="10"/>
  <!-- headers -->
  <g transform="translate(20,20)">
    <!-- 7 columns -->
    <g>
      <rect x="0" y="0" width="1160" height="40" class="col"/>
      <!-- weekday labels -->
      <g transform="translate(0,0)">
        <!-- calculate widths -->
        <g>
          <rect x="0" y="0" width="165" height="40" fill="none"/>
        </g>
      </g>
      <!-- draw weekday texts -->
      <text class="header" x="20" y="28">Понеділок 01</text>
      <text class="header" x="185" y="28">Вівторок 02</text>
      <text class="header" x="350" y="28">Середа 03</text>
      <text class="header" x="515" y="28">Четвер 04</text>
      <text class="header" x="680" y="28">П'ятниця 05</text>
      <text class="header" x="845" y="28">Субота 06</text>
      <text class="header" x="1010" y="28">Неділя 07</text>
    </g>

    <!-- columns -->
    <g transform="translate(0,60)">
      <!-- 7 columns each 160px wide -->
      <g>
        <rect class="col" x="0" y="0" width="160" height="660" rx="6"/>
        <rect class="col" x="165" y="0" width="160" height="660" rx="6"/>
        <rect class="col" x="330" y="0" width="160" height="660" rx="6"/>
        <rect class="col" x="495" y="0" width="160" height="660" rx="6"/>
        <rect class="col" x="660" y="0" width="160" height="660" rx="6"/>
        <rect class="col" x="825" y="0" width="160" height="660" rx="6"/>
        <rect class="col" x="990" y="0" width="170" height="660" rx="6"/>

        <!-- sample events (stacked) -->
        <rect x="12" y="12" width="136" height="28" rx="6" fill="#60a5fa"/>
        <text class="event" x="20" y="32">09:00 Богослужіння — Церква</text>

        <rect x="12" y="50" width="136" height="24" rx="6" fill="#34d399"/>
        <text class="event" x="20" y="66">Підготовка хору</text>

        <rect x="177" y="12" width="136" height="24" rx="6" fill="#fb7185"/>
        <text class="event" x="185" y="28">Репетиція</text>

        <rect x="342" y="12" width="136" height="28" rx="6" fill="#fbbf24"/>
        <text class="event" x="350" y="32">Зустріч волонтерів</text>

      </g>
    </g>
  </g>
</svg>
